<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  html, body {
    width: 72px; height: 72px;
    background: transparent; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  #ball {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.96);
    position: relative;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  #arc {
    position: absolute; top: 0; left: 0;
    width: 44px; height: 44px;
    pointer-events: none;
  }

  #val {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #16a34a;
    position: relative;
    z-index: 2;
    line-height: 1;
  }

  #ball.alert {
    border: 2px solid #dc2626;
    animation: ballAlertPulse 1.2s ease-in-out infinite;
  }
  @keyframes ballAlertPulse {
    0%, 100% { box-shadow: 0 0 5px 5px rgba(220, 38, 38, 0.90); }
    50%       { box-shadow: 0 0 10px 4px rgba(220, 38, 38, 0.18); }
  }
</style>
</head>
<body>
<div id="ball">
  <canvas id="arc" width="88" height="88"></canvas>
  <span id="val">--</span>
</div>

<script>
  // Trend -> angle (math: 0°=right, 90°=up)
  const TREND_ANGLE = { '↑↑': 90, '↑': 90, '↗': 45, '→': 0, '↘': -45, '↓': -90, '↓↓': -90 }

  let ballThreshLow   = 70
  let ballThreshHigh  = 180
  let ballThreshAlert = 250

  function glucoseColor(v) {
    if (v < 55)                return '#dc2626'
    if (v < ballThreshLow)     return '#d97706'
    if (v <= ballThreshHigh)   return '#16a34a'
    if (v <= ballThreshAlert)  return '#d97706'
    return '#dc2626'
  }

  function drawArc(color, trend) {
    const canvas = document.getElementById('arc')
    const ctx = canvas.getContext('2d')
    ctx.clearRect(0, 0, 88, 88)
    const angle = TREND_ANGLE[trend]
    if (angle === undefined) return
    // Canvas Y-axis goes downward, math Y-axis goes upward, so negate
    const start = (-(angle + 38)) * Math.PI / 180
    const end   = (-(angle - 38)) * Math.PI / 180
    ctx.beginPath()
    ctx.arc(44, 44, 40, start, end)
    ctx.strokeStyle = color
    ctx.lineWidth   = 7
    ctx.lineCap     = 'round'
    ctx.stroke()
  }

  // ── Alert state ──────────────────────────────────────────────────────────────
  let alertActive = false

  function applyAlert(active) {
    alertActive = !!active
    document.getElementById('ball').classList.toggle('alert', alertActive)
  }

  // ── Update display ───────────────────────────────────────────────────────────
  function update(data) {
    if (data.thresh_low   != null) ballThreshLow   = data.thresh_low
    if (data.thresh_high  != null) ballThreshHigh  = data.thresh_high
    if (data.thresh_alert != null) ballThreshAlert = data.thresh_alert
    const color = glucoseColor(data.value)
    document.getElementById('val').textContent  = data.display_value != null ? data.display_value : data.value
    document.getElementById('val').style.color  = color
    drawArc(color, data.trend || '→')
    if (data.alert !== undefined) applyAlert(data.alert)
  }

  // Initial draw
  drawArc('#16a34a', '→')

  // ── IPC ─────────────────────────────────────────────────────────────────────
  window.electronAPI?.on('update_ball', update)
  window.electronAPI?.on('set_alert_ui', (data) => applyAlert(data.active))

  // ── Drag (Y-axis) ──────────────────────────────────────────────────────────
  let dragStartScreenY = 0
  let dragging = false

  document.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return
    dragging = false
    dragStartScreenY = e.screenY
    window.electronAPI?.send({ action: 'ball_drag_start', screenY: e.screenY })
  })

  document.addEventListener('mousemove', (e) => {
    if (e.buttons !== 1) return
    if (!dragging && Math.abs(e.screenY - dragStartScreenY) > 3) dragging = true
    if (dragging) window.electronAPI?.send({ action: 'ball_drag_move', screenY: e.screenY })
  })

  document.addEventListener('mouseup', (e) => {
    if (e.button !== 0) return
    if (!dragging) window.electronAPI?.send({ action: 'ball_click' })
    dragging = false
  })

  // ── Hover (expand) ───────────────────────────────────────────────────────────
  document.getElementById('ball').addEventListener('mouseenter', () => {
    window.electronAPI?.send({ action: 'ball_hover' })
  })

  // ── Right-click context menu ──────────────────────────────────────────────
  document.addEventListener('contextmenu', (e) => {
    e.preventDefault()
    window.electronAPI?.send({ action: 'ball_contextmenu' })
  })
</script>
</body>
</html>
